name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sync:
        description: Sync plugin
        type: boolean
        default: true
      backup:
        description: Backup plugin
        type: boolean
        default: true
      appearance:
        description: Appearance plugin
        type: boolean
        default: true
      lang:
        description: Language plugin
        type: boolean
        default: true
      predict:
        description: Predict plugin (offline autocomplete)
        type: boolean
        default: true
      voice:
        description: Voice plugin (on-device dictation)
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # Manual runs (workflow_dispatch) use the boolean inputs above —
      # untick a plugin in the "Run workflow" dialog and it goes off.
      # Push runs use vars.* from GitHub → Settings → Secrets and
      # variables → Actions → Variables (a missing variable means the
      # plugin is off).
      - name: Resolve plugin flags
        id: flags
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          IN_SYNC: ${{ inputs.sync }}
          IN_BACKUP: ${{ inputs.backup }}
          IN_APPEARANCE: ${{ inputs.appearance }}
          IN_LANG: ${{ inputs.lang }}
          IN_PREDICT: ${{ inputs.predict }}
          IN_VOICE: ${{ inputs.voice }}
          VAR_SYNC: ${{ vars.VITE_OLLU_SYNC }}
          VAR_BACKUP: ${{ vars.VITE_OLLU_BACKUP }}
          VAR_APPEARANCE: ${{ vars.VITE_OLLU_APPEARANCE }}
          VAR_LANG: ${{ vars.VITE_OLLU_LANG }}
          VAR_PREDICT: ${{ vars.VITE_OLLU_PREDICT }}
          VAR_VOICE: ${{ vars.VITE_OLLU_VOICE }}
        run: |
          resolve() {
            local name=$1 input=$2 fallback=$3
            if [ "$EVENT" = "workflow_dispatch" ]; then
              [ "$input" = "true" ] && echo "$name=1" || echo "$name="
            else
              echo "$name=$fallback"
            fi
          }
          {
            resolve VITE_OLLU_SYNC "$IN_SYNC" "$VAR_SYNC"
            resolve VITE_OLLU_BACKUP "$IN_BACKUP" "$VAR_BACKUP"
            resolve VITE_OLLU_APPEARANCE "$IN_APPEARANCE" "$VAR_APPEARANCE"
            resolve VITE_OLLU_LANG "$IN_LANG" "$VAR_LANG"
            resolve VITE_OLLU_PREDICT "$IN_PREDICT" "$VAR_PREDICT"
            resolve VITE_OLLU_VOICE "$IN_VOICE" "$VAR_VOICE"
          } >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          VITE_OLLU_SYNC: ${{ steps.flags.outputs.VITE_OLLU_SYNC }}
          VITE_OLLU_BACKUP: ${{ steps.flags.outputs.VITE_OLLU_BACKUP }}
          VITE_OLLU_APPEARANCE: ${{ steps.flags.outputs.VITE_OLLU_APPEARANCE }}
          VITE_OLLU_LANG: ${{ steps.flags.outputs.VITE_OLLU_LANG }}
          VITE_OLLU_PREDICT: ${{ steps.flags.outputs.VITE_OLLU_PREDICT }}
          VITE_OLLU_VOICE: ${{ steps.flags.outputs.VITE_OLLU_VOICE }}
          # Server URL and Google client ID always come from Variables —
          # they're shared config, not per-run toggles.
          VITE_OLLU_SERVER: ${{ vars.VITE_OLLU_SERVER }}
          VITE_OLLU_GOOGLE_CLIENT_ID: ${{ vars.VITE_OLLU_GOOGLE_CLIENT_ID }}
        run: bun run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
